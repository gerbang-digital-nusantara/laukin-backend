name: Setup Nginx API Path

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "inspect (lihat config) | apply (pasang location /laukin-api/)"
        required: true
        default: "inspect"

jobs:
  nginx:
    runs-on: ubuntu-latest

    steps:
      - name: Run on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            MODE="${{ github.event.inputs.mode }}"

            if [ "$MODE" = "inspect" ]; then
              echo "--- web server terpasang ---"
              echo "nginx : $(command -v nginx || echo tidak-ada)"
              echo "caddy : $(command -v caddy || echo tidak-ada)"
              echo "apache: $(command -v apache2 || echo tidak-ada)"
              echo "--- port yang listen (80/443/3084/4207) ---"
              ss -tlnp 2>/dev/null | grep -E ':(80|443|3084|4207)\s' | awk '{print $4, $6}' || echo "(kosong)"
              echo "--- container docker ---"
              docker ps --format '{{.Names}} -> {{.Ports}}' || true
              echo "--- config nginx yang ada ---"
              ls /etc/nginx/sites-enabled/ 2>/dev/null || true
              ls /etc/nginx/conf.d/ 2>/dev/null || true
              grep -rh "server_name" /etc/nginx/ 2>/dev/null | sort -u | head -10 || true
              echo "--- apakah domain mengarah ke VPS ini? ---"
              VPS_PUB=$(curl -s -4 ifconfig.me || true)
              for d in lauk.in www.lauk.in api.lauk.in; do
                R=$(getent hosts "$d" | awk '{print $1}' | head -1)
                if [ -n "$R" ] && [ "$R" = "$VPS_PUB" ]; then echo "$d -> MENGARAH ke VPS ini"; else echo "$d -> bukan ke VPS ini"; fi
              done
              exit 0
            fi

            CONF=$(grep -rls "lauk\.in" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null | head -1)
            if [ -z "$CONF" ]; then
              echo "Tidak menemukan config nginx untuk lauk.in"; exit 1
            fi
            echo "Config: $CONF"

            if grep -q "laukin-api" "$CONF"; then
              echo "location /laukin-api/ sudah ada, tidak ada perubahan."
            else
              BACKUP="$CONF.bak-laukin-$(date +%s)"
              cp "$CONF" "$BACKUP"
              echo "Backup: $BACKUP"

              printf '%s\n' \
                '    location /laukin-api/ {' \
                '        proxy_pass http://127.0.0.1:4207/;' \
                '        proxy_http_version 1.1;' \
                '        proxy_set_header Host $host;' \
                '        proxy_set_header X-Real-IP $remote_addr;' \
                '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' \
                '        proxy_set_header X-Forwarded-Proto $scheme;' \
                '        proxy_set_header Upgrade $http_upgrade;' \
                '        proxy_set_header Connection "upgrade";' \
                '        proxy_read_timeout 3600s;' \
                '        proxy_send_timeout 3600s;' \
                '    }' > /tmp/laukin-api-block.txt

              sed -i "/^\s*server_name[^;]*lauk\.in/r /tmp/laukin-api-block.txt" "$CONF"

              if nginx -t; then
                nginx -s reload || systemctl reload nginx
                echo "Nginx berhasil di-reload."
              else
                echo "nginx -t GAGAL - mengembalikan backup."
                cp "$BACKUP" "$CONF"
                nginx -t
                exit 1
              fi
            fi

            echo "--- verifikasi ---"
            sleep 1
            curl -s -o /dev/null -w "health via nginx: HTTP %{http_code}\n" https://lauk.in/laukin-api/health || true
            curl -s -o /dev/null -w "health langsung : HTTP %{http_code}\n" http://127.0.0.1:4207/health || true
